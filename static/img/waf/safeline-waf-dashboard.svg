    <text x="18" y="54" class="value">52</text>
    <text x="180" y="27" class="label">Error Rate</text>
    <text x="180" y="54" class="value">74.29%</text>
  </g>

  <g transform="translate(555,200)">
    <rect width="330" height="65" rx="10" fill="#ffffff" stroke="#dde7ea"/>
