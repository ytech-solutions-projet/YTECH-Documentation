    <text x="18" y="54" class="value">4</text>
    <text x="180" y="27" class="label">Blocked Rate</text>
    <text x="180" y="54" class="value">5.71%</text>
  </g>

  <g transform="translate(895,200)">
    <rect width="327" height="65" rx="10" fill="#ffffff" stroke="#dde7ea"/>
    <text x="18" y="27" class="label">5xx Errors</text>
    <text x="18" y="54" class="value">0</text>
    <text x="180" y="27" class="label">Error Rate</text>
    <text x="180" y="54" class="value">0.00%</text>
  </g>

