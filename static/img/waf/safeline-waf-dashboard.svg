<svg xmlns="http://www.w3.org/2000/svg" width="1580" height="824" viewBox="0 0 1580 824" role="img" aria-labelledby="title desc">
  <title id="title">Vue synthétique du tableau de bord SafeLine WAF</title>
  <desc id="desc">Illustration du tableau de bord de statistiques SafeLine WAF avec cartes de métriques, carte géographique et graphes de statut.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbfc"/>
      <stop offset="100%" stop-color="#eef4f5"/>
    </linearGradient>
    <linearGradient id="globe" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#8ff1ec"/>
      <stop offset="100%" stop-color="#49c7cf"/>
    </linearGradient>
    <style>
      .small { font: 16px 'Segoe UI', Arial, sans-serif; fill: #66737d; }
      .label { font: 22px 'Segoe UI', Arial, sans-serif; fill: #7b8790; }
      .value { font: 36px 'Segoe UI', Arial, sans-serif; font-weight: 700; fill: #18242d; }
      .title { font: 28px 'Segoe UI', Arial, sans-serif; font-weight: 700; fill: #18242d; }
      .menu { font: 28px 'Segoe UI', Arial, sans-serif; fill: #24353d; }
      .menuActive { font: 28px 'Segoe UI', Arial, sans-serif; fill: white; }
      .tab { font: 24px 'Segoe UI', Arial, sans-serif; fill: #5b666f; }
      .tabActive { font: 24px 'Segoe UI', Arial, sans-serif; fill: white; font-weight: 700; }
    </style>
  </defs>

  <rect width="1580" height="824" fill="url(#bg)"/>
  <rect x="20" y="20" width="175" height="784" rx="12" fill="#f7fbfc"/>
  <text x="46" y="52" class="title">SafeLine WAF</text>
  <rect x="20" y="58" width="175" height="1" fill="#d9e6e8"/>
  <rect x="20" y="78" width="175" height="44" rx="8" fill="#22c6c4"/>
  <text x="56" y="107" class="menuActive">Statistics</text>
  <text x="56" y="150" class="menu">Applications</text>
  <text x="56" y="190" class="menu">Attacks</text>
  <text x="56" y="230" class="menu">Allow &amp; Deny</text>
  <text x="56" y="270" class="menu">HTTP Flood</text>
  <text x="56" y="310" class="menu">Anti-Bot</text>
  <text x="56" y="350" class="menu">Auth</text>
  <text x="56" y="390" class="menu">Settings</text>
  <text x="40" y="760" class="small">Version 9.3.3</text>

  <text x="220" y="50" class="title">SafeLine WAF &gt; Statistics</text>
  <rect x="220" y="76" width="190" height="38" rx="8" fill="#22c6c4"/>
  <text x="238" y="102" class="tabActive">TRAFFIC ANALYSIS</text>
  <text x="425" y="102" class="tab">SECURITY POSTURE</text>
  <text x="615" y="102" class="tab">DATA DASHBOARD</text>

  <rect x="1295" y="72" width="165" height="36" rx="8" fill="#ffffff" stroke="#d7e1e4"/>
  <text x="1330" y="96" class="small">All applications</text>
  <rect x="1470" y="72" width="90" height="36" rx="8" fill="#ffffff" stroke="#d7e1e4"/>
  <text x="1497" y="96" class="small">24 hours</text>

  <g transform="translate(215,116)">
    <rect width="337" height="75" rx="10" fill="#ffffff" stroke="#dde7ea"/>
    <text x="18" y="32" class="label">Requests</text>
    <text x="18" y="62" class="value">70</text>
    <text x="170" y="32" class="label">Views (PV)</text>
    <text x="170" y="62" class="value">58</text>
    <text x="320" y="32" class="label" text-anchor="end">Visitors (UV)</text>
    <text x="320" y="62" class="value" text-anchor="end">10</text>
  </g>

  <g transform="translate(560,116)">
    <rect width="330" height="75" rx="10" fill="#ffffff" stroke="#dde7ea"/>
    <text x="18" y="32" class="label">Unique IP</text>
    <text x="18" y="62" class="value">10</text>
    <text x="180" y="32" class="label">Blocked</text>
    <text x="180" y="62" class="value">4</text>
