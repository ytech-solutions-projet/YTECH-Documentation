  <text x="238" y="319" class="title">Geo Location</text>
  <circle cx="608" cy="541" r="122" fill="url(#globe)"/>
  <circle cx="608" cy="541" r="152" fill="none" stroke="#ecf4f5" stroke-width="18"/>
  <circle cx="608" cy="541" r="175" fill="none" stroke="#f4f8f9" stroke-width="18"/>
  <path d="M565 487c22-16 39-24 61-20 24 4 45 20 67 45 11 13 18 30 13 47-6 22-22 29-36 43-17 18-36 23-57 16-23-8-41-29-54-56-14-29-11-55 6-75z" fill="#dffafa" opacity=".72"/>
  <path d="M635 615c17 8 28 18 27 30-2 14-19 24-42 24-20 0-37-8-46-18-10-12-3-24 13-33 14-8 31-9 48-3z" fill="#dffafa" opacity=".72"/>

  <rect x="958" y="388" width="240" height="242" rx="10" fill="#f9fbfc" stroke="#e0eaed"/>
  <text x="980" y="420" class="label">India</text>
  <text x="1178" y="420" class="label" text-anchor="end">38</text>
  <rect x="980" y="431" width="200" height="6" rx="3" fill="#dbe9ec"/>
  <rect x="980" y="431" width="200" height="6" rx="3" fill="#22c6c4"/>
  <text x="980" y="472" class="label">Morocco</text>
  <text x="1178" y="472" class="label" text-anchor="end">24</text>
  <rect x="980" y="483" width="200" height="6" rx="3" fill="#dbe9ec"/>
  <rect x="980" y="483" width="177" height="6" rx="3" fill="#22c6c4"/>
  <text x="980" y="524" class="label">United States</text>
  <text x="1178" y="524" class="label" text-anchor="end">6</text>
  <rect x="980" y="535" width="200" height="6" rx="3" fill="#dbe9ec"/>
  <rect x="980" y="535" width="105" height="6" rx="3" fill="#22c6c4"/>
  <text x="980" y="576" class="label">France</text>
  <text x="1178" y="576" class="label" text-anchor="end">1</text>
  <rect x="980" y="587" width="200" height="6" rx="3" fill="#dbe9ec"/>
  <rect x="980" y="587" width="38" height="6" rx="3" fill="#22c6c4"/>
  <text x="980" y="628" class="label">United Kingdom</text>
  <text x="1178" y="628" class="label" text-anchor="end">1</text>
  <rect x="980" y="639" width="200" height="6" rx="3" fill="#dbe9ec"/>
  <rect x="980" y="639" width="32" height="6" rx="3" fill="#22c6c4"/>

  <rect x="1238" y="277" width="322" height="232" rx="12" fill="#ffffff" stroke="#dde7ea"/>
  <text x="1262" y="320" class="title">Requests Status</text>
  <text x="1538" y="320" class="label" text-anchor="end">Max 65</text>
  <path d="M1268 488 L1350 488 L1405 488 L1460 488 L1505 488 L1518 355 L1534 477" fill="none" stroke="#2aa1de" stroke-width="5"/>
  <line x1="1268" y1="488" x2="1538" y2="488" stroke="#dbe5e9" stroke-width="2"/>

  <rect x="1238" y="520" width="322" height="221" rx="12" fill="#ffffff" stroke="#dde7ea"/>
  <text x="1262" y="562" class="title">Blocking Status</text>
  <text x="1538" y="562" class="label" text-anchor="end">Max 3</text>
  <path d="M1268 718 L1468 718 L1514 718 L1523 637 L1535 700" fill="none" stroke="#ff6e8d" stroke-width="5"/>
  <line x1="1268" y1="718" x2="1538" y2="718" stroke="#dbe5e9" stroke-width="2"/>
</svg>
